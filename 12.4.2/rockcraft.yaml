name: grafana
summary: Grafana in a ROCK.
description: >
  The open and composable observability and data visualization platform. Visualize metrics, logs, and traces from multiple sources like Prometheus, Loki, Elasticsearch, InfluxDB, Postgres and many more.

version: "12.4.2"
base: ubuntu@24.04
license: AGPL-3.0
services:
  grafana:
    command: /bin/grafana-server --config /etc/grafana/grafana-config.ini
    override: replace
    startup: enabled
platforms:
  amd64:
parts:
  grafana:
    plugin: go
    source: https://github.com/grafana/grafana.git
    source-tag: v12.4.2
    source-depth: 1
    build-snaps:
      - go/1.24/stable
    override-build: |
      set -x
      make build-go
      find bin -type f -executable | while read f; do install -D -m 755 $f ${CRAFT_PART_INSTALL}/usr/$(echo $f | sed -e 's%linux-amd64/%%'); done
      cp -rpv conf ${CRAFT_PART_INSTALL}/conf
      mkdir -p ${CRAFT_PART_INSTALL}/etc/grafana
      touch ${CRAFT_PART_INSTALL}/etc/grafana/grafana-config.ini
    stage:
      - bin/*
      - usr/bin/grafana*
      - conf/
      - etc/grafana
  grafana-ui:
    after: [grafana]
    plugin: nil
    source-type: git
    source: https://github.com/grafana/grafana.git
    source-tag: v12.4.2
    build-snaps:
      - node/22/stable
    build-environment:
      - NODE_OPTIONS: "--max-old-space-size=4096"
    override-build: |
      npm install --location=global --prefix $CRAFT_PART_BUILD yarn
      [[ -v http_proxy ]] && yarn config set httpProxy ${http_proxy}
      [[ -v https_proxy ]] && yarn config set httpsProxy ${https_proxy}
      yarn config
      # Yarn 4 has a bug packing git-protocol dependencies (tries to rename a
      # dir into itself -> EINVAL). Replace the git ref with a tarball URL.
      COMMIT="a10c748f40edc538425b458af4e471a8262ec4ed"
      TARBALL_URL="https://github.com/grafana/react-data-grid/archive/${COMMIT}.tar.gz"
      find . -name package.json -not -path '*/node_modules/*' \
        -exec sed -i "s|grafana/react-data-grid#${COMMIT}|${TARBALL_URL}|g" {} +
      YARN_ENABLE_PROGRESS_BARS=false YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install
      echo "Building frontend"
      # This is to avoid OOM issues
      # Just run tasks sequentially
      export NX_DAEMON=false
      export NX_PARALLEL=1
      make build-js
      mkdir -p ${CRAFT_PART_INSTALL}/{public,tools}
      cp -rpv public/* ${CRAFT_PART_INSTALL}/public/
    stage:
      - public/
      - tools/
  ca-certs:
    plugin: nil
    overlay-packages:
      - ca-certificates
  deb-security-manifest:
    plugin: nil
    after:
      - grafana
      - grafana-ui
      - ca-certs
    override-prime: |
      set -x
      mkdir -p $CRAFT_PRIME/usr/share/rocks/
      (echo "# os-release" && cat /etc/os-release && echo "# dpkg-query" && dpkg-query --admindir=$CRAFT_PRIME/var/lib/dpkg/ -f '${db:Status-Abbrev},${binary:Package},${Version},${source:Package},${Source:Version}\n' -W) > $CRAFT_PRIME/usr/share/rocks/dpkg.query
