name: grafana
summary: Grafana in a ROCK.
description: >
  The open and composable observability and data visualization platform. Visualize metrics, logs, and traces from multiple sources like Prometheus, Loki, Elasticsearch, InfluxDB, Postgres and many more.

version: "12.4.2"
base: ubuntu@24.04
license: AGPL-3.0
services:
  grafana:
    command: /bin/grafana-server --config /etc/grafana/grafana-config.ini
    override: replace
    startup: enabled
platforms:
  amd64:
parts:
  grafana:
    plugin: go
    source: https://github.com/grafana/grafana.git
    source-tag: v12.4.2
    source-depth: 1
    build-snaps:
      - go/1.25/stable
    override-build: |
      set -x
      make build-go
      find bin -type f -executable | while read f; do install -D -m 755 $f ${CRAFT_PART_INSTALL}/usr/$(echo $f | sed -e 's%linux-amd64/%%'); done
      cp -rpv conf ${CRAFT_PART_INSTALL}/conf
      mkdir -p ${CRAFT_PART_INSTALL}/etc/grafana
      touch ${CRAFT_PART_INSTALL}/etc/grafana/grafana-config.ini
    stage:
      - bin/*
      - usr/bin/grafana*
      - conf/
      - etc/grafana
  grafana-ui:
    after: [grafana]
    plugin: nil
    source-type: git
    source: https://github.com/grafana/grafana.git
    source-tag: v12.4.2
    build-snaps:
      - node/22/stable
    build-environment:
    - NODE_OPTIONS: "--max-old-space-size=8192"
    - YARN_ENABLE_GLOBAL_CACHE: "false"   # ← added
    override-build: |
      corepack enable                        # ← use corepack instead of npm-installed yarn
      [[ -v http_proxy ]] && yarn config set httpProxy ${http_proxy}
      [[ -v https_proxy ]] && yarn config set httpsProxy ${https_proxy}
      yarn config
      YARN_ENABLE_PROGRESS_BARS=false yarn install --immutable
      echo "Building frontend"
      make build-js
      mkdir -p ${CRAFT_PART_INSTALL}/{public,tools}
      cp -rpv public/* ${CRAFT_PART_INSTALL}/public/
  ca-certs:
    plugin: nil
    overlay-packages:
      - ca-certificates
  deb-security-manifest:
    plugin: nil
    after:
      - grafana
      - grafana-ui
      - ca-certs
    override-prime: |
      set -x
      mkdir -p $CRAFT_PRIME/usr/share/rocks/
      (echo "# os-release" && cat /etc/os-release && echo "# dpkg-query" && dpkg-query --admindir=$CRAFT_PRIME/var/lib/dpkg/ -f '${db:Status-Abbrev},${binary:Package},${Version},${source:Package},${Source:Version}\n' -W) > $CRAFT_PRIME/usr/share/rocks/dpkg.query